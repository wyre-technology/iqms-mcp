name: Release

on:
  push:
    branches:
      - main
      - next
      - beta
      - alpha
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test
    # Delegated to the canonical reusable CI workflow.
    # See: ~/.claude/skills/mcp-server-fleet-ci-template
    uses: wyre-technology/.github/.github/workflows/mcp-server-ci.yml@8f1da6a78d0cc0b8a330547bfc6892da3e72ae13
    with:
      node-versions: '["18", "20", "22"]'
    secrets: inherit

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      packages: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      released: ${{ steps.version.outputs.released }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Configure npm for GitHub Packages
        run: |
          echo "@wyre-technology:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Capture pre-release version
        run: |
          PRE_VERSION=$(node -p "require('./package.json').version")
          echo "PRE_VERSION=$PRE_VERSION" >> "$GITHUB_ENV"

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Get released version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "$VERSION" != "$PRE_VERSION" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5.10.0
        with:
          images: ghcr.io/wyre-technology/iqms-mcp
          tags: |
            type=raw,value=${{ needs.release.outputs.version }},enable=${{ needs.release.outputs.released == 'true' }}
            type=raw,value=v${{ needs.release.outputs.version }},enable=${{ needs.release.outputs.released == 'true' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Configure npm for GitHub Packages
        run: |
          echo "@wyre-technology:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      - name: Build and push Docker image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5.4.0
        env:
          COMMIT_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.release.outputs.version }}
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ env.COMMIT_TIMESTAMP }}
            NODE_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}

  mcp-registry:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    needs: [release, docker]
    if: needs.release.outputs.released == 'true'
    permissions:
      id-token: write
      contents: read
    env:
      VERSION: ${{ needs.release.outputs.version }}
    steps:
      - name: Checkout (post-release commit)
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Install mcp-publisher
        run: |
          # SHA-pinned for supply-chain integrity (this job has id-token:write).
          MCP_PUBLISHER_VERSION=v1.7.9
          MCP_PUBLISHER_SHA256=ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
          arch="$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
          curl -fsSL -o mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_${arch}.tar.gz"
          echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum -c -
          tar xzf mcp-publisher.tar.gz mcp-publisher
          rm mcp-publisher.tar.gz

      - name: Stamp version into server.json
        run: |
          jq --arg v "$VERSION" \
            '.version = $v
             | .packages[0].identifier = "ghcr.io/wyre-technology/iqms-mcp:v" + $v' \
            server.json > server.json.tmp
          mv server.json.tmp server.json
          cat server.json

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

      - name: Verify registry listing
        run: |
          sleep 5
          curl -sf "https://registry.modelcontextprotocol.io/v0.1/servers?search=io.github.wyre-technology/iqms-mcp" \
            | jq '.servers[] | {name, version}'
